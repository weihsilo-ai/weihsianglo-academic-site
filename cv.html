<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Curriculum Vitae for Wei-Hsiang Lo, Human Factors Researcher and Ph.D. student at the University of Michigan.">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="https://weihsianglo-academic-site.vercel.app/cv.html">
    <title>Wei-Hsiang Lo CV</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #050505;
        --panel: #101010;
        --text: #e8e8e8;
        --muted: #b2b2b2;
        --border: #2a2a2a;
        --accent: #60a5fa;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        color: var(--text);
        background: var(--bg);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang TC", "Microsoft JhengHei", Arial, sans-serif;
      }

      main {
        width: min(100%, 980px);
        padding: 28px;
        border: 1px solid var(--border);
        border-radius: 8px;
        background: var(--panel);
      }

      h1 {
        margin: 0 0 10px;
        font-size: 28px;
      }

      p {
        color: var(--muted);
        line-height: 1.6;
      }

      a {
        color: var(--accent);
        font-weight: 700;
        text-decoration: none;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin: 18px 0;
      }

      .actions a {
        display: inline-flex;
        align-items: center;
        min-height: 36px;
        padding: 6px 12px;
        border: 1px solid var(--border);
        border-radius: 8px;
      }

      object {
        width: 100%;
        height: min(78vh, 920px);
        border: 1px solid var(--border);
        border-radius: 8px;
        background: var(--bg);
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Wei-Hsiang Lo Curriculum Vitae</h1>
      <p>Human Factors Researcher · Ph.D. Student, Industrial and Operations Engineering, University of Michigan</p>
      <div class="actions">
        <a href="Wei-Hsiang-Lo-CV.pdf">Open PDF</a>
        <a href="index.html">Back to portfolio</a>
      </div>
      <object data="Wei-Hsiang-Lo-CV.pdf" type="application/pdf">
        <p>Your browser cannot preview this PDF here. <a href="Wei-Hsiang-Lo-CV.pdf">Open the CV PDF</a>.</p>
      </object>
    </main>
  </body>
</html>
